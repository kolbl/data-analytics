# Pre-commit and tests run in parallel. On pushes to main, after both succeed,
# builds a PEP 440 dev release (<base>.dev<run_number>) and publishes with uv.
#
# Add a PyPI API token as repository secret PYPI_API_TOKEN (Account settings → API tokens).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run pre-commit on all files
        run: uv run pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run tests in parallel
        run: uv run pytest -n auto

  publish:
    needs: [pre-commit, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Set dev version (PEP 440)
        run: |
          base="$(uv version --short)"
          uv version "${base}.dev${{ github.run_number }}" --frozen
      - name: Build distributions
        run: uv build
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          UV_PUBLISH_URL: https://test.pypi.org/legacy/
        run: uv publish
